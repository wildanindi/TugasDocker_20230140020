<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Mahasiswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto; /* Biar posisinya di tengah */
        }
        h2 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #007bff;
            outline: none;
        }
        .radio-group {
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Biar tombol radionya agak ke kanan sesuai gambar */
            max-width: 400px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .submit-btn {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            display: block;
            margin-bottom: 20px;
        }
        .submit-btn:hover {
            background-color: #0056b3;
        }
        .back-link {
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Input Mahasiswa</h2>

    <form th:action="@{/submit-data}" method="post">

        <div class="form-group">
            <label for="nama">Nama:</label>
            <input type="text" id="nama" name="nama" required>
        </div>

        <div class="form-group">
            <label for="nim">NIM:</label>
            <input type="text" id="nim" name="nim" required>
        </div>

        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <div class="radio-group">
                <div class="radio-item">
                    <label for="laki">Laki-laki</label>
                    <input type="radio" id="laki" name="jenis_kelamin" value="Laki-laki" required>
                </div>
                <div class="radio-item">
                    <label for="perempuan">Perempuan</label>
                    <input type="radio" id="perempuan" name="jenis_kelamin" value="Perempuan" required>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
    </form>

    <a th:href="@{/home}" class="back-link">Kembali ke Home</a>
</div>

</body>
</html>
